<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>US Short-term Strength Stocks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <div class="eyebrow">每日自動更新</div>
        <h1>美股短炒強勢股篩選器</h1>
        <p class="subtitle">免費版｜市值、5日/20日跑贏 SPY、貼近 52 週高位</p>
      </div>
      <div id="summaryCard" class="summary-card">載入中…</div>
    </header>

    <section class="tabs-row">
      <button class="tab active">短炒強勢股</button>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="搜尋股票代號 / 公司名" />
      <select id="sortSelect">
        <option value="rs_20d_vs_spy_pct_desc">按跑贏SPY(20D) ↓</option>
        <option value="rs_5d_vs_spy_pct_desc">按跑贏SPY(5D) ↓</option>
        <option value="dist_from_52w_high_pct_desc">按接近52週高位 ↑</option>
        <option value="market_cap_desc">按市值 ↓</option>
        <option value="symbol_asc">按代號 A→Z</option>
      </select>
    </section>

    <section class="rules-card" id="rulesCard"></section>

    <section class="table-card">
      <div class="table-title-row">
        <h2>符合條件股票</h2>
        <span id="countText"></span>
      </div>
      <div class="table-wrap">
        <table id="results-table">
          <thead>
            <tr>
              <th>代號</th>
              <th>公司</th>
              <th>交易所</th>
              <th>市值</th>
              <th>最近收市</th>
              <th>5日回報</th>
              <th>20日回報</th>
              <th>跑贏SPY(5D)</th>
              <th>跑贏SPY(20D)</th>
              <th>52週高位</th>
              <th>距52週高位</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty hidden">暫時冇符合條件股票。</div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
